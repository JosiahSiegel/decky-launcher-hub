name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  python-tests:
    name: Python Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('config/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Run Python tests
      run: |
        cd tests && python run_tests.py

  javascript-tests:
    name: JavaScript Frontend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint || true
    
    - name: Run type checking
      run: npm run type-check || true
    
    - name: Run JavaScript tests with coverage
      run: npm run test:coverage
    
    - name: Upload JavaScript coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: javascript
        name: JavaScript-Node${{ matrix.node-version }}
        fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [python-tests, javascript-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18.x"
        cache: 'npm'
    
    - name: Setup Python
      run: |
        python -m pip install --upgrade pip
    
    - name: Install JavaScript dependencies
      run: npm ci
    
    - name: Run integration tests
      run: |
        npm run test:integration
    
    - name: Run full test suite
      run: |
        cd tests && python run_tests.py
        npm run test:integration

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18.x"
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build plugin with IIFE wrapper
      run: npm run build
    
    - name: Verify project structure
      run: make verify
    
    - name: Check dist/index.js exists and has IIFE format
      run: |
        if [ ! -f "dist/index.js" ]; then
          echo "Error: dist/index.js not found"
          exit 1
        fi
        echo "✓ dist/index.js exists"
        
        # Check for IIFE wrapper format
        if head -n 1 dist/index.js | grep -q "(function(DFL, SP_REACT)"; then
          echo "✓ dist/index.js has correct IIFE wrapper"
        else
          echo "Error: dist/index.js missing IIFE wrapper"
          exit 1
        fi
    
    - name: Validate plugin.json
      run: |
        python -m json.tool plugin.json > /dev/null
        echo "✓ plugin.json is valid JSON"
    
    - name: Check Python syntax
      run: |
        python -m py_compile src/backend/main.py
        echo "✓ src/backend/main.py syntax is valid"
        python -m py_compile tests/run_tests.py
        echo "✓ tests/run_tests.py syntax is valid"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Check for outdated dependencies
      run: |
        npm outdated || true
        pip list --outdated || true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [python-tests, javascript-tests, integration-tests, build-verification]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "## Test Results Summary"
        echo ""
        echo "✅ All tests completed"
        echo ""
        echo "### Test Coverage"
        echo "- Python Backend: View in Codecov"
        echo "- JavaScript Frontend: View in Codecov"
        echo "- Integration Tests: Passed"
        echo ""
        echo "### Next Steps"
        echo "1. Review any failing tests"
        echo "2. Check coverage reports"
        echo "3. Address any security vulnerabilities"